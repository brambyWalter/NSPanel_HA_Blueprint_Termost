#####################################################################################################
#####                 NSPanel Easy - https://github.com/edwardtfn/NSPanel-Easy                  #####
#####################################################################################################
##### ESPHOME - Page Select                                                                     #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################

---
substitutions:
  TAG_PAGE_SELECT: nspanel.page.select

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_EASY_PAGE_SELECT

script:
  - id: !extend page_change
    then:
      - lambda: |-
          if (new_page_id != get_page_id("select")) return;
          page_select->execute();

  - id: page_select
    mode: single
    then:
      - lambda: |-
          ESP_LOGV("${TAG_PAGE_SELECT}", "Constructor: page_select");

          // Open the picker overlaid on this page. Cache is populated by
          // Blueprint's page_changed handler shortly after this fires; the
          // initial paint may show empty rows until that arrives. Title is
          // a localized placeholder, replaced by the entity's friendly name
          // once Blueprint's handler runs.
          std::string placeholder_title = "${LOCALIZATION[LANG].select.please_select}";
          popup_select_open->execute(last_page_id, placeholder_title);

  - id: !extend picker_selected
    then:
      - lambda: |-
          if (context != "select_option") return;

          if (mask == 0) {
            // No selection — input_select / select entities always have a current value,
            // so a deselect tap is a no-op for v1.
            ESP_LOGV("${TAG_PAGE_SELECT}", "select_option deselect ignored");
            return;
          }

          // Derive the service from the entity's domain.
          // input_select.foo -> input_select.select_option
          // select.bar       -> select.select_option
          const size_t dot = entity.find('.');
          if (dot == std::string::npos) {
            ESP_LOGW("${TAG_PAGE_SELECT}", "Invalid entity '%s'", entity.c_str());
            return;
          }
          const std::string domain = entity.substr(0, dot);
          const std::string service = domain + ".select_option";

          ESP_LOGD("${TAG_PAGE_SELECT}", "Dispatch: %s entity=%s option=%s",
                                          service.c_str(), entity.c_str(), value.c_str());

          fire_ha_event("action_call", {
            {"action", service.c_str()},
            {"entity", entity.c_str()},
            {"key", "option"},
            {"value", value.c_str()}
          });

  - id: !extend stop_page_constructors
    then:
      - lambda: page_select->stop();
...